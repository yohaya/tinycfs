name: Build Release Binaries

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Static musl binary (zero glibc dependency, runs on any Linux) ─────────
  build-musl:
    name: Build · musl-static
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install musl toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq musl-tools

      - name: Add musl Rust target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build static musl binary
        env:
          TINYCFS_BUILD_NUMBER: ${{ github.run_number }}
          TINYCFS_GIT_SHA: ${{ github.sha }}
        run: |
          export TINYCFS_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cargo build --release --locked --target x86_64-unknown-linux-musl 2>&1
          # Verify it is truly statically linked
          file target/x86_64-unknown-linux-musl/release/tinycfs
          ldd  target/x86_64-unknown-linux-musl/release/tinycfs || true

      - name: Smoke-test static binary
        run: ./target/x86_64-unknown-linux-musl/release/tinycfs --help || true

      - name: Copy artifact
        run: cp target/x86_64-unknown-linux-musl/release/tinycfs tinycfs-linux-x86_64

      - name: Upload binary (musl-static)
        uses: actions/upload-artifact@v4
        with:
          name: tinycfs-linux-x86_64
          path: tinycfs-linux-x86_64
          if-no-files-found: error

  # ── Commit binary to bin/ in the repository ──────────────────────────────
  publish-bin:
    name: Publish bin/
    runs-on: ubuntu-latest
    needs: [build-musl]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          pattern: tinycfs-*
          path: bin/
          merge-multiple: true

      - name: Make binary executable
        run: chmod +x bin/tinycfs-*

      - name: List bin/
        run: ls -lh bin/

      - name: Commit and push binary
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bin/
          git diff --cached --quiet \
            && echo "binary unchanged, nothing to commit" \
            && exit 0
          git commit -m "ci: update bin/ binary [skip ci]"
          git push

  # ── Create release tarball ────────────────────────────────────────────────
  package:
    name: Package release bundle
    runs-on: ubuntu-latest
    needs: [build-musl]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Show dist tree
        run: find dist/ -type f | sort

      - name: Create tarball
        run: |
          tar -czf tinycfs-release-${{ github.sha }}.tar.gz -C dist .

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: tinycfs-release-${{ github.sha }}
          path: tinycfs-release-${{ github.sha }}.tar.gz
