name: Build Release Binaries

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Build inside distro-native Docker containers ──────────────────────────
  build:
    name: Build · ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Ubuntu 22.04 LTS (jammy) — glibc 2.35 ──────────────────────────
          - name: ubuntu22
            image: ubuntu:22.04

          # ── Ubuntu 24.04 LTS (noble) — glibc 2.38 ──────────────────────────
          - name: ubuntu24
            image: ubuntu:24.04

    steps:
      # ── Checkout on the host runner (modern Node available) ──────────────
      - uses: actions/checkout@v4

      # ── Build inside the target container ────────────────────────────────
      - name: Build in ${{ matrix.name }} container
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/src" \
            -w /src \
            --env CARGO_TERM_COLOR=always \
            "${{ matrix.image }}" \
            bash -eux -c '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y -qq \
                curl \
                build-essential \
                pkg-config \
                libfuse-dev \
                ca-certificates \
                git

              # Install Rust (musl-targets for static builds need musl-tools too)
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain stable --profile minimal
              source "$HOME/.cargo/env"

              # Compile release binary
              cargo build --release --locked 2>&1

              # Quick smoke-test: binary exists and --help works
              ./target/release/tinycfs --help || true

              # Copy out with distro label so artifact names are unique
              cp target/release/tinycfs /src/tinycfs-${{ matrix.name }}-x86_64
            '

      # ── Upload per-distro artifact ────────────────────────────────────────
      - name: Upload binary (${{ matrix.name }})
        uses: actions/upload-artifact@v4
        with:
          name: tinycfs-${{ matrix.name }}-x86_64
          path: tinycfs-${{ matrix.name }}-x86_64
          if-no-files-found: error

  # ── Static musl binary (zero glibc dependency) ───────────────────────────
  build-musl:
    name: Build · musl-static
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install musl toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq musl-tools

      - name: Add musl Rust target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build static musl binary
        run: |
          cargo build --release --locked --target x86_64-unknown-linux-musl 2>&1
          # Verify it is truly statically linked
          file target/x86_64-unknown-linux-musl/release/tinycfs
          ldd  target/x86_64-unknown-linux-musl/release/tinycfs || true

      - name: Smoke-test static binary
        run: ./target/x86_64-unknown-linux-musl/release/tinycfs --help || true

      - name: Copy artifact
        run: cp target/x86_64-unknown-linux-musl/release/tinycfs tinycfs-musl-x86_64

      - name: Upload binary (musl-static)
        uses: actions/upload-artifact@v4
        with:
          name: tinycfs-musl-x86_64
          path: tinycfs-musl-x86_64
          if-no-files-found: error

  # ── Commit static binary to bin/ in the repository ───────────────────────
  publish-bin:
    name: Publish bin/tinycfs-linux-x86_64
    runs-on: ubuntu-latest
    needs: build-musl
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Use a token so the push can trigger downstream workflows if needed.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: tinycfs-musl-x86_64
          path: bin/

      - name: Rename artifact to canonical name
        run: mv bin/tinycfs-musl-x86_64 bin/tinycfs-linux-x86_64

      - name: Make binary executable
        run: chmod +x bin/tinycfs-linux-x86_64

      - name: Commit and push binary
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bin/tinycfs-linux-x86_64
          git diff --cached --quiet && echo "binary unchanged, nothing to commit" && exit 0
          git commit -m "ci: update bin/tinycfs-linux-x86_64 [skip ci]"
          git push

  # ── Collect all binaries into a single release artifact ──────────────────
  package:
    name: Package release bundle
    runs-on: ubuntu-latest
    needs: [build, build-musl]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Show dist tree
        run: find dist/ -type f | sort

      - name: Create tarball
        run: |
          tar -czf tinycfs-release-${{ github.sha }}.tar.gz -C dist .

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: tinycfs-release-${{ github.sha }}
          path: tinycfs-release-${{ github.sha }}.tar.gz
